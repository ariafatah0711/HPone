{% extends "honeypots/base.html" %}

{% block content %}
<div class="rounded-3xl border border-slate-800 bg-slate-900/70 p-5 shadow-2xl shadow-black/30">
  <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
    <div>
      <h2 class="text-lg font-semibold">Edit YAML</h2>
      <p class="text-sm text-slate-400">{{ honeypot_id }}</p>
    </div>
    <a class="text-sm text-slate-300 hover:text-emerald-300" href="{% url 'honeypot-detail' honeypot_id %}">Back to details</a>
  </div>

  <form method="post" class="mt-4 space-y-3">
    {% csrf_token %}
    <div class="rounded-2xl border border-slate-800 bg-slate-950/70 p-3">
      {{ form.content }}
    </div>
    <div class="flex flex-wrap gap-2">
      <button class="inline-flex h-10 w-28 items-center justify-center rounded-full border border-emerald-400/40 bg-emerald-500/10 text-xs font-semibold text-emerald-200 transition hover:border-emerald-300 hover:bg-emerald-500/20" type="submit">Save</button>
      <a class="inline-flex h-10 w-28 items-center justify-center rounded-full border border-slate-600 bg-slate-900 text-xs font-semibold text-slate-200 transition hover:border-slate-400" href="{% url 'honeypot-detail' honeypot_id %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
